name: ShoeTracker
options:
  bundleIdPrefix: com.shoetracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
targets:
  ShoeTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShoeTracker
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: ShoeTracker
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "ShoeTracker ขออ่านข้อมูลการวิ่งจาก Apple Health เพื่อคำนวณระยะทางสะสมของรองเท้าแต่ละคู่โดยอัตโนมัติ"
        NSHealthUpdateUsageDescription: "ShoeTracker อาจบันทึกข้อมูลกลับไปยัง Apple Health ในอนาคต"
        STRAVA_CLIENT_ID: "$(STRAVA_CLIENT_ID)"
        STRAVA_CLIENT_SECRET: "$(STRAVA_CLIENT_SECRET)"
        CFBundleURLTypes:
          - CFBundleURLName: strava-oauth
            CFBundleURLSchemes: [shoetracker]
    entitlements:
      path: Generated/ShoeTracker.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shoetracker.app
        TARGETED_DEVICE_FAMILY: "1"
